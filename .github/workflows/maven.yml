name: Maven CI
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Java
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # Bước 3: Thực thi vòng đời build của Maven (test và package)
      - name: Build with Maven (Test and Package)
        run: mvn -B clean test package

      # Bước 4: Lưu giữ tệp .jar tạo ra (upload-artifact)
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-app-jar
          path: target/*.jar
          retention-days: 14